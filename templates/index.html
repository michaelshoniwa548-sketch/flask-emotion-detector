<html>
<head>
    <title>CodeCraftHub | Your Learning Management Platform</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <script src="./static/mywebscript.js"></script>
    <style>
        .center-heading {
            text-align: center;
        }
        .btn-primary {
            background-color: #8B5CF6;
            border-color: #8B5CF6;
            border-radius: 8px;
            padding: 10px 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #6D28D9;
            border-color: #6D28D9;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }
        .btn-success {
            background-color: #F59E0B;
            border-color: #F59E0B;
            border-radius: 8px;
            padding: 10px 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-success:hover {
            background-color: #D97706;
            border-color: #D97706;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }
        .btn-danger {
            background-color: #dc3545;
            border-color: #dc3545;
            border-radius: 8px;
            padding: 10px 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-danger:hover {
            background-color: #b21f2d;
            border-color: #b21f2d;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-body">
            <h1 class="center-heading">NLP - Emotion Detection</h1> 
            <div style="padding: 25px 25px 25px 25px;">
            <h2 class="mb-3">
                <label class="form-label">Please enter the text to be analyzed</label>
                <input type="textarea" class="form-control" id="textToAnalyze">
            </h2>

            <div style="padding: 25px 25px 25px 25px;">
                <button onclick="RunSentimentAnalysis()" class="btn btn-success">Run Sentiment Analysis</button>
                <button onclick="handleDelete()" class="btn btn-danger" style="margin-left: 10px;">Remove</button>
            </div>
            <script>
                function handleDelete() {
                    document.getElementById('textToAnalyze').value = '';
                    document.getElementById('system_response').innerHTML = '';
                }
            </script>
            <div style="padding: 25px 25px 25px 25px;"></div>
            <h2 class="mb-3">
                <label class="form-label">Result of Emotion Detection</label>
            </h2>

            <div id="system_response" style="padding: 25px 25px 25px 25px;"></div>
        </div>
    </div>
</body>
</html>
